version: "3.9"

services:
  # --- Local graph store ---
  neo4j:
    image: neo4j:5.18-community
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      retries: 5

  # --- Local vector store ---
  chromadb:
    image: chromadb/chroma:0.5.0
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      retries: 5

  # --- Ollama (local LLM) ---
  # NOTE: run `ollama pull llama3.2` and `ollama pull nomic-embed-text` after first start
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # --- Knowledge Engine API ---
  api:
    build: .
    ports:
      - "8200:8200"
    environment:
      - CLOUD_PROVIDER=local
      - NEO4J_URI=bolt://neo4j:7687
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./wiki-output:/app/wiki-output
      - ${SOURCE_REPOS_PATH:-../}:/repos:ro

  # --- Streamlit UI ---
  ui:
    build: .
    command: ["streamlit", "run", "ui/app.py", "--server.port=8501"]
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8200
    depends_on:
      - api

volumes:
  neo4j_data:
  chroma_data:
  ollama_data:
