name: Wiki Rebuild

on:
  push:
    paths:
      - "**/*.md"   # Rebuild wiki when any markdown doc changes
    branches: [main]
  workflow_dispatch:   # Allow manual trigger

jobs:
  rebuild-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Rebuild wiki (local provider — no cloud cost)
        env:
          CLOUD_PROVIDER: local
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          echo "Wiki rebuild triggered by markdown change"
          echo "Skipping in CI — requires running services (Neo4j, ChromaDB, Ollama)"
          echo "Run manually: curl -X POST http://localhost:8200/wiki/rebuild"

      - name: Commit wiki output
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add wiki-output/ || true
          git diff --staged --quiet || git commit -m "chore: auto-rebuild wiki [skip ci]"
          git push || true
